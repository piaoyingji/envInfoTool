<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnvPortal - サーバ接続情報管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="i18n.js"></script>
    <style>
        .actions-bar {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-card);
        }
        .rdp-toolbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .rdp-stat {
            color: var(--text-muted);
            font-size: 0.86rem;
            white-space: nowrap;
        }
        .rdp-stat strong {
            color: var(--text-main);
            font-weight: 600;
        }
        .toolbar-pagination {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .toolbar-pagination button {
            min-height: 34px;
            min-width: 34px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        .toolbar-pagination button:hover:not(:disabled) {
            color: var(--primary);
            border-color: var(--primary);
        }
        .toolbar-pagination button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .toolbar-pagination span {
            color: var(--text-muted);
            font-size: 0.86rem;
            min-width: 76px;
            text-align: center;
        }
        .org-card {
            padding: 0;
            overflow: hidden;
        }
        .org-block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border-bottom: 1px solid #e6f0f5;
            padding: 1rem 1.25rem;
            background: linear-gradient(180deg, #ffffff 0%, #f6fcfd 100%);
        }
        .org-header-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary);
            border-left: 4px solid var(--primary);
            padding-left: 0.75rem;
            margin: 0;
        }
        .rdp-card-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
            gap: 1.25rem;
            padding: 1rem 1.25rem 1.25rem;
        }
        .rdp-editor-card {
            background: linear-gradient(180deg, #f0fafc 0%, #ffffff 46%, #ffffff 100%);
            border: 1px solid #c8e5ec;
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(13, 55, 74, 0.09);
            overflow: hidden;
        }
        .rdp-editor-card-header {
            padding: 0.85rem 1rem;
            background: linear-gradient(180deg, #f7fcfd 0%, #eaf8fb 100%);
            border-bottom: 1px solid #dcebf1;
        }
        .rdp-editor-card-title {
            color: var(--text-main);
            font-weight: 700;
            font-size: 1rem;
        }
        .rdp-editor-body {
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 0.85rem;
        }
        .edit-field {
            min-width: 0;
        }
        .edit-field.span-6 { grid-column: span 6; }
        .edit-field.span-4 { grid-column: span 4; }
        .edit-field.span-8 { grid-column: span 8; }
        .edit-field.span-12 { grid-column: span 12; }
        .edit-field input,
        .edit-field select {
            width: 100%;
            min-height: 38px;
            padding: 0.45rem 0.6rem;
            font-size: 0.85rem;
            background-color: #ffffff;
            border: 1px solid var(--border);
            border-radius: 6px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .edit-field input:focus,
        .edit-field select:focus {
            outline: none;
            border-color: #39b8cc;
            box-shadow: 0 0 0 3px rgba(8,126,164,0.15);
        }
        .edit-field label {
            font-size: 0.75rem; 
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
            display: block;
            white-space: nowrap;
        }
        .rdp-editor-card-footer {
            display: flex;
            justify-content: flex-end;
            padding: 0.8rem 1rem;
            border-top: 1px solid #dcebf1;
            background: #f6fcfd;
        }
        .del-btn {
            background: #ffffff;
            color: #ff4d4f; 
            border: 1px solid #ffccc7; 
            padding: 0.45rem 0.8rem; 
            border-radius: 6px; 
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 0;
            transition: all 0.2s;
        }
        .del-btn:hover {
            background-color: #ff4d4f;
            border-color: #ff4d4f;
            color: white;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            padding-bottom: 2rem;
        }
        .pagination button {
            background-color: #ffffff;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 2px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .pagination button:hover:not(:disabled) {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination span {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: bold;
        }
        @media (max-width: 760px) {
            .rdp-card-list {
                grid-template-columns: 1fr;
            }
            .edit-field.span-6 {
                grid-column: span 12;
            }
            .edit-field.span-4,
            .edit-field.span-8 {
                grid-column: span 12;
            }
        }
    </style>
</head>
<body data-title-key="app.rdpTitle">
    <header class="top-header">
        <div class="logo-area">
            <h1>Env<span>Portal</span></h1>
            <p data-i18n="header.rdpDesc">Windows / Linux などのサーバ遠隔接続情報を管理します</p>
        </div>
        <nav class="main-nav">
            <div class="main-nav-inner">
                <a href="index.html" data-i18n="nav.search">環境検索</a>
                <a href="admin.html" data-i18n="nav.admin">データ管理</a>
                <a href="rdp.html" class="active" data-i18n="nav.rdp">サーバ接続情報管理</a>
            </div>
        </nav>
    </header>

    <div class="container" id="adminContainer" style="max-width: 1400px; width: 95%; margin: 0 auto; display: none;">
        
        <div class="actions-bar">
            <div>
                <div class="rdp-toolbar-left">
                    <select id="orgFilter" style="width: 280px; color: var(--primary); font-weight: 600;" onchange="currentOrgPage = 1; renderEditor()">
                        <option value="" data-i18n="select.allOrgs">▼ 全ての組織を表示</option>
                    </select>
                    <span id="rdpStat" class="rdp-stat" data-i18n="state.loading">読み込み中...</span>
                </div>
            </div>
            <div style="flex-grow: 1;"></div>
            <div id="toolbarPagination" class="toolbar-pagination"></div>
            <button id="btnAdd" type="button" class="secondary-btn" onclick="addNewRow()" data-i18n="button.addRow">＋ 新規行を追加</button>
            <button id="btnSave" type="button" class="primary-btn" onclick="saveToServer()" data-i18n="button.saveAll">保存する (一括更新)</button>
        </div>

        <div id="editorArea">
            <div style="text-align:center; color:var(--text-muted); padding: 4rem; border: 1px solid var(--border); background: var(--card); font-weight: bold;" data-i18n="state.loading">データを読み込んでいます...</div>
        </div>
    </div>

    <!-- パスワード モーダル -->
    <div id="pwdModal" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:2rem; border-radius:3px; width:320px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.2); border-top: 5px solid var(--primary);">
            <h3 style="margin-bottom:0.5rem; font-size:1.2rem; color:var(--text-main);" data-i18n="modal.unlockTitle">ロック解除</h3>
            <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1.5rem;" data-i18n="modal.unlockDesc">編集用のパスワードを入力してください</p>
            <input type="password" id="modalPwdInput" style="margin-bottom:1.5rem; text-align:center; font-size:1.2rem; letter-spacing:5px; padding: 0.8rem;" onkeypress="if(event.key==='Enter') submitPwdModal()">
            <div style="display:flex; justify-content:space-between; gap:1rem;">
                <button type="button" class="secondary-btn" style="flex:1;" onclick="closePwdModal()" data-i18n="button.cancel">キャンセル</button>
                <button type="button" class="primary-btn" style="flex:1;" onclick="submitPwdModal()" data-i18n="button.confirm">確認</button>
            </div>
        </div>
    </div>

    <!-- 弹窗提示 -->
    <div id="toast" data-i18n="toast.saved">保存成功。</div>

    <script>
        let currentData = [];
        let currentOrgPage = 1;
        const ORGS_PER_PAGE = 6;

        window.addEventListener('DOMContentLoaded', () => {
            const expiry = localStorage.getItem('authExpiry');
            if (expiry && new Date().getTime() < parseInt(expiry)) {
                document.getElementById('pwdModal').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'block';
                loadAdminData();
            } else {
                document.getElementById('modalPwdInput').focus();
            }
        });

        window.addEventListener('i18n:changed', () => {
            initFilter();
            renderEditor();
        });

        function loadAdminData() {
            fetch('rdp.csv?t=' + new Date().getTime(), { cache: 'no-store' })
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.text();
                })
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            currentData = results.data;
                            initFilter();
                            renderEditor();
                        }
                    });
                })
                .catch(error => {
                    console.error('rdp.csv の読み込みに失敗しました:', error);
                    document.getElementById('editorArea').innerHTML = `<div style="text-align:center; color:red; padding: 2rem;">${t('select.loadFailed')}</div>`;
                });
        }

        function renderEditor() {
            const editorArea = document.getElementById('editorArea');
            editorArea.innerHTML = '';

            if(currentData.length === 0) {
                editorArea.innerHTML = `<div class="card" style="text-align:center; padding:4rem; color:var(--text-muted); font-weight: bold;">${t('state.noAdminData')}</div>`;
                renderRdpSummary(0, 0, 1, 1);
                return;
            }

            const orgMap = new Map();
            currentData.forEach((row, idx) => {
                const org = (row['組織名'] || '').trim();
                let key = org === '' ? t('unset.org') : org;
                if (!orgMap.has(key)) orgMap.set(key, []);
                orgMap.get(key).push({ ...row, originalIndex: idx });
            });

            const sortedOrgs = Array.from(orgMap.keys()).sort((a,b) => {
                if(a === t('unset.org')) return -1;
                if(b === t('unset.org')) return 1;
                return a.localeCompare(b);
            });

            const filterVal = document.getElementById('orgFilter').value;
            let filteredOrgs = sortedOrgs;

            if (filterVal !== '') {
                filteredOrgs = sortedOrgs.filter(org => org === filterVal || org === t('unset.org'));
            }

            if (filteredOrgs.length === 0) {
                renderRdpSummary(0, currentData.length, 1, 1);
                editorArea.innerHTML = `<div class="card" style="text-align:center; padding:4rem; color:var(--text-muted); font-weight: 600;">${t('state.noMatchedOrg')}</div>`;
                return;
            }

            const totalPages = Math.ceil(filteredOrgs.length / ORGS_PER_PAGE);
            if (currentOrgPage > totalPages) currentOrgPage = Math.max(1, totalPages);
            if (currentOrgPage < 1) currentOrgPage = 1;
            renderRdpSummary(filteredOrgs.length, currentData.length, currentOrgPage, Math.max(1, totalPages));

            const startIndex = (currentOrgPage - 1) * ORGS_PER_PAGE;
            const endIndex = Math.min(startIndex + ORGS_PER_PAGE, filteredOrgs.length);
            const orgsToShow = filteredOrgs.slice(startIndex, endIndex);

            orgsToShow.forEach(org => {
                const orgBlock = document.createElement('div');
                orgBlock.className = 'card org-card';

                const orgHeader = document.createElement('div');
                orgHeader.className = 'org-block-header';
                orgHeader.innerHTML = `<h2 class="org-header-title">${escapeHtml(org)}</h2>`;
                orgBlock.appendChild(orgHeader);

                const list = document.createElement('div');
                list.className = 'rdp-card-list';
                const rows = orgMap.get(org);
                rows.forEach(item => {
                    const idx = item.originalIndex;
                    const itemEditor = document.createElement('div');
                    itemEditor.className = 'rdp-editor-card';
                    itemEditor.innerHTML = `
                        <div class="rdp-editor-card-header">
                            <div class="rdp-editor-card-title">${escapeHtml(item['接続先(IP:Port)']) || t('unset.value')}</div>
                        </div>
                        <div class="rdp-editor-body">
                            <div class="edit-field span-12">
                                <label>${t('label.orgName')}</label>
                                <input type="text" value="${escapeHtml(item['組織名'])}" onchange="updateData(${idx}, '組織名', this.value)">
                            </div>
                            <div class="edit-field span-8">
                                <label>${t('label.connection')}(IP:Port)</label>
                                <input type="text" value="${escapeHtml(item['接続先(IP:Port)'])}" onchange="updateData(${idx}, '接続先(IP:Port)', this.value); updateRemoteTypeFromTarget(${idx}); renderEditor()">
                            </div>
                            <div class="edit-field span-4">
                                <label>${t('label.remoteType')}</label>
                                ${renderRemoteTypeSelect(idx, getRemoteType(item))}
                            </div>
                            <div class="edit-field span-6">
                                <label>${t('label.remoteUser')}</label>
                                <input type="text" value="${escapeHtml(item['RDPユーザー名'])}" onchange="updateData(${idx}, 'RDPユーザー名', this.value)">
                            </div>
                            <div class="edit-field span-6">
                                <label>${t('label.remotePassword')}</label>
                                <input type="text" value="${escapeHtml(item['RDPパスワード'])}" onchange="updateData(${idx}, 'RDPパスワード', this.value)">
                            </div>
                        </div>
                        <div class="rdp-editor-card-footer">
                            <button type="button" class="del-btn" onclick="deleteRow(${idx})" title="${t('button.deleteRdp')}">${t('button.deleteRdp')}</button>
                        </div>
                    `;
                    list.appendChild(itemEditor);
                });

                orgBlock.appendChild(list);
                editorArea.appendChild(orgBlock);
            });

        }

        function renderRdpSummary(orgCount, rowCount, page, totalPages) {
            const stat = document.getElementById('rdpStat');
            if (stat) stat.innerHTML = t('rdp.stat', { org: orgCount, rdp: rowCount });

            const pager = document.getElementById('toolbarPagination');
            if (!pager) return;
            pager.innerHTML = '';

            const prevBtn = document.createElement('button');
            prevBtn.type = 'button';
            prevBtn.textContent = '‹';
            prevBtn.onclick = () => changePage(-1);
            prevBtn.disabled = page <= 1;

            const pageSpan = document.createElement('span');
            pageSpan.textContent = `${page} / ${totalPages}`;

            const nextBtn = document.createElement('button');
            nextBtn.type = 'button';
            nextBtn.textContent = '›';
            nextBtn.onclick = () => changePage(1);
            nextBtn.disabled = page >= totalPages;

            pager.appendChild(prevBtn);
            pager.appendChild(pageSpan);
            pager.appendChild(nextBtn);
        }

        function changePage(direction) {
            currentOrgPage += direction;
            renderEditor();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateData(index, field, value) {
            currentData[index][field] = value;
            if (field === '組織名') {
                initFilter();
            }
        }

        function renderRemoteTypeSelect(index, selectedType) {
            const types = ['', 'RDP', 'SSH'];
            return `<select onchange="updateData(${index}, '接続タイプ', this.value)">${types.map(type => {
                const selected = type === selectedType ? ' selected' : '';
                return `<option value="${escapeHtml(type)}"${selected}>${escapeHtml(type)}</option>`;
            }).join('')}</select>`;
        }

        function getRemoteType(row) {
            const explicitType = String(row['接続タイプ'] || row['接続種別'] || row['タイプ'] || '').trim();
            if (explicitType) return explicitType.toUpperCase();
            return inferRemoteType(row['接続先(IP:Port)']);
        }

        function inferRemoteType(target) {
            const match = String(target || '').match(/:(\d+)\s*$/);
            if (!match) return '';
            if (match[1] === '22') return 'SSH';
            if (match[1] === '3389') return 'RDP';
            return '';
        }

        function updateRemoteTypeFromTarget(index) {
            const row = currentData[index];
            if (!row) return;
            if ((row['接続タイプ'] || '').trim()) return;
            const inferred = inferRemoteType(row['接続先(IP:Port)']);
            if (inferred) row['接続タイプ'] = inferred;
        }

        function deleteRow(index) {
            if(confirm(t('confirm.delete'))) {
                currentData.splice(index, 1);
                saveToServer();
            }
        }

        function addNewRow() {
            const filterVal = document.getElementById('orgFilter').value;
            currentData.unshift({
                '組織名': filterVal || '',
                '接続タイプ': '',
                'RDPユーザー名': '',
                'RDPパスワード': '',
                '接続先(IP:Port)': ''
            });
            
            // 新規追加時は確実に1ページ目に戻す
            currentOrgPage = 1;

            initFilter();
            renderEditor();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initFilter() {
            const orgSelect = document.getElementById('orgFilter');
            const currentSelected = orgSelect.value;
            
            const orgSet = new Set();
            currentData.forEach(item => {
                const val = (item['組織名'] || '').trim();
                if(val !== '') orgSet.add(val);
            });
            
            orgSelect.innerHTML = `<option value="">${t('select.allOrgs')}</option>`;
            Array.from(orgSet).sort().forEach(org => {
                const opt = document.createElement('option');
                opt.value = org;
                opt.textContent = org;
                orgSelect.appendChild(opt);
            });
            
            if(Array.from(orgSelect.options).some(o => o.value === currentSelected)) {
                orgSelect.value = currentSelected;
            }
        }

        function saveToServer() {
            const filteredData = currentData.filter(row => {
                return (row['組織名'] || '').trim() !== '';
            });
            
            const fields = ["組織名", "接続タイプ", "RDPユーザー名", "RDPパスワード", "接続先(IP:Port)"];
            const csv = Papa.unparse({
                fields: fields,
                data: filteredData.map(row => ({
                    ...row,
                    '接続タイプ': getRemoteType(row)
                }))
            }, { quotes: true });
            
            fetch('update_rdp.jsp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain; charset=UTF-8'
                },
                body: csv
            })
            .then(res => {
                if (res.ok) {
                    currentData = filteredData;
                    initFilter();
                    renderEditor();
                    showToast(t('toast.savedDetail'));
                } else {
                    res.text().then(text => alert('Server error: ' + text));
                }
            })
            .catch(err => {
                console.error(err);
                alert(t('error.network'));
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function closePwdModal() {
            window.location.href = 'index.html';
        }

        function submitPwdModal() {
            const pwd = document.getElementById('modalPwdInput').value;
            if (!pwd) return;

            fetch('auth.jsp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'pwd=' + encodeURIComponent(pwd)
            })
            .then(res => res.text())
            .then(txt => {
                if (txt.trim() === "OK") {
                    localStorage.setItem('authExpiry', new Date().getTime() + 15 * 60 * 1000);
                    document.getElementById('pwdModal').style.display = 'none';
                    document.getElementById('adminContainer').style.display = 'block';
                    loadAdminData();
                    showToast(t('toast.authOk'));
                } else {
                    alert(t('error.authWrong'));
                    document.getElementById('modalPwdInput').value = '';
                    document.getElementById('modalPwdInput').focus();
                }
            })
            .catch(err => {
                console.error(err);
                alert(t('error.auth'));
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
