<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnvPortal - 環境データ管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="i18n.js"></script>
    <style>
        .actions-bar {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-card);
        }
        .admin-toolbar-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .admin-stat {
            color: var(--text-muted);
            font-size: 0.86rem;
            white-space: nowrap;
        }
        .admin-stat strong {
            color: var(--text-main);
            font-weight: 600;
        }
        .toolbar-pagination {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .toolbar-pagination button {
            min-height: 34px;
            min-width: 34px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
        }
        .toolbar-pagination button:hover:not(:disabled) {
            color: var(--primary);
            border-color: var(--primary);
        }
        .toolbar-pagination button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        .toolbar-pagination span {
            color: var(--text-muted);
            font-size: 0.86rem;
            min-width: 76px;
            text-align: center;
        }
        .org-card {
            padding: 0;
            overflow: hidden;
        }
        .org-header-title {
            border-left: 4px solid var(--primary);
            padding-left: 0.75rem;
            margin: 0;
            flex: 1;
        }
        .org-block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border-bottom: 1px solid #e6f0f5;
            padding: 1rem 1.25rem;
            margin-bottom: 0;
            background: linear-gradient(180deg, #ffffff 0%, #f6fcfd 100%);
        }
        .org-block-header .org-header-title {
            border-bottom: none;
            margin-bottom: 0;
        }
        .org-code {
            color: #9bb2bd;
            font-size: 1.15rem;
            font-weight: 500;
            margin-left: auto;
            background: transparent;
            border: none;
            border-radius: 0;
            padding: 0;
        }
        .org-title-editor {
            flex: 1;
            display: grid;
            grid-template-columns: minmax(260px, 1fr) 140px;
            gap: 0.75rem;
            align-items: end;
            border-left: 4px solid var(--primary);
            padding-left: 0.75rem;
        }
        .org-title-editor .edit-field label {
            color: #6b7f8f;
        }
        .org-title-editor input {
            font-size: 1.05rem;
            font-weight: 600;
        }
        .org-title-editor .org-code-input {
            color: #9bb2bd;
            font-family: "Segoe UI Semibold", "Arial", "Meiryo UI", sans-serif;
            text-align: right;
        }
        .env-card-editor-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(620px, 1fr));
            gap: 1.25rem;
            padding: 1rem 1.25rem 1.25rem;
        }
        .env-editor-card {
            background: linear-gradient(180deg, #f0fafc 0%, #ffffff 46%, #ffffff 100%);
            border: 1px solid #c8e5ec;
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(13, 55, 74, 0.09);
            overflow: hidden;
        }
        .env-editor-card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 1rem;
            background: linear-gradient(180deg, #f7fcfd 0%, #eaf8fb 100%);
            border-bottom: 1px solid #dcebf1;
        }
        .env-editor-card-title {
            flex: 1;
            min-width: 180px;
        }
        .env-editor-card-title input {
            font-size: 1rem;
            font-weight: 600;
        }
        .env-title-tags {
            margin-top: 0.5rem;
        }
        .env-title-tags input {
            font-size: 0.85rem;
            font-weight: 400;
            background: #fff;
        }
        .env-editor-body {
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 0.85rem;
        }
        .env-editor-card-footer {
            display: flex;
            justify-content: flex-end;
            padding: 0.8rem 1rem;
            border-top: 1px solid #dcebf1;
            background: #f6fcfd;
        }
        .editor-section {
            grid-column: span 12;
            border: 1px solid #d7e6ee;
            border-radius: 10px;
            background: rgba(255,255,255,0.86);
            overflow: hidden;
        }
        .editor-section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.65rem 0.85rem;
            background: linear-gradient(180deg, #f7fcfd 0%, #eaf8fb 100%);
            border-bottom: 1px solid #d7e6ee;
        }
        .editor-section-title {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            color: var(--primary);
            font-size: 0.86rem;
            font-weight: 700;
        }
        .db-detected-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            min-height: 24px;
            padding: 0.1rem 0.55rem;
            border-radius: 999px;
            color: #087ea4;
            background: #e6f8fb;
            border: 1px solid #a8dce7;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .db-section-actions {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .db-probe-btn {
            min-height: 28px;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.65rem;
            border: 1px solid #b8e2ea;
            border-radius: 999px;
            color: var(--primary);
            background: #ffffff;
            font-size: 0.74rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .db-probe-btn:hover {
            border-color: var(--primary);
            background: #ecf9fb;
        }
        .db-probe-btn svg {
            flex: 0 0 auto;
        }
        .editor-section-grid {
            padding: 0.9rem;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 0.8rem;
        }
        .edit-field {
            min-width: 0;
        }
        .edit-field.span-3 { grid-column: span 3; }
        .edit-field.span-4 { grid-column: span 4; }
        .edit-field.span-6 { grid-column: span 6; }
        .edit-field.span-8 { grid-column: span 8; }
        .edit-field.span-12 { grid-column: span 12; }
        .edit-field input,
        .edit-field select {
            width: 100%;
            min-height: 38px;
            padding: 0.45rem 0.6rem;
            font-size: 0.85rem;
            background-color: #ffffff;
            border: 1px solid var(--border);
            border-radius: 6px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .edit-field input:focus,
        .edit-field select:focus {
            outline: none;
            border-color: #39b8cc;
            box-shadow: 0 0 0 3px rgba(8,126,164,0.15);
        }
        .edit-field label {
            font-size: 0.75rem; 
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
            white-space: nowrap;
        }
        .del-btn {
            background: #ffffff;
            color: #ff4d4f; 
            border: 1px solid #ffccc7; 
            padding: 0.45rem 0.8rem; 
            border-radius: 6px; 
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 0;
            transition: all 0.2s;
        }
        .del-btn:hover {
            background-color: #ff4d4f;
            border-color: #ff4d4f;
            color: white;
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            padding-bottom: 2rem;
        }
        .pagination button {
            background-color: #ffffff;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .pagination.top-pagination {
            justify-content: flex-end;
            margin: 0 0 1rem;
            padding-bottom: 0;
        }
        .pagination button:hover:not(:disabled) {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination span {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: bold;
        }
        @media (max-width: 760px) {
            .env-card-editor-list {
                grid-template-columns: 1fr;
            }
            .edit-field.span-4,
            .edit-field.span-3,
            .edit-field.span-8,
            .edit-field.span-6 {
                grid-column: span 12;
            }
            .org-title-editor {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body data-title-key="app.adminTitle">
    <header class="top-header">
        <div class="logo-area">
            <h1>Env<span>Portal</span></h1>
            <p data-i18n="header.adminDesc">既存の環境情報を修正、または新しい組織の情報を追加します</p>
        </div>
        <nav class="main-nav">
            <div class="main-nav-inner">
                <a href="index.html" data-i18n="nav.search">環境検索</a>
                <a href="admin.html" class="active" data-i18n="nav.admin">データ管理</a>
                <a href="rdp.html" data-i18n="nav.rdp">RDP情報管理</a>
            </div>
        </nav>
    </header>

    <div class="container" id="adminContainer" style="max-width: 1400px; width: 95%; margin: 0 auto; display: none;">
        
        <div class="actions-bar">
            <div>
                <div class="admin-toolbar-left">
                    <select id="orgFilter" style="width: 280px; color: var(--primary); font-weight: 600;" onchange="currentOrgPage = 1; renderEditor()">
                        <option value="" data-i18n="select.allOrgs">▼ 全ての組織を表示</option>
                    </select>
                    <span id="adminStat" class="admin-stat" data-i18n="state.loading">読み込み中...</span>
                </div>
            </div>
            <div style="flex-grow: 1;"></div>
            <div id="toolbarPagination" class="toolbar-pagination"></div>
            <button type="button" class="secondary-btn" onclick="probeAllDatabases()" data-i18n="button.probeAllDb">DB再探測</button>
            <button id="btnAdd" type="button" class="secondary-btn" onclick="addNewRow()" data-i18n="button.addRow">＋ 新規行を追加</button>
            <button id="btnSave" type="button" class="primary-btn" onclick="saveToServer()" data-i18n="button.saveAll">保存する (一括更新)</button>
        </div>

        <div id="editorArea">
            <div style="text-align:center; color:var(--text-muted); padding: 4rem; border: 1px solid var(--border); background: var(--card); font-weight: bold;" data-i18n="state.loading">データを読み込んでいます...</div>
        </div>
    </div>

    <!-- パスワード モーダル -->
    <div id="pwdModal" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:2rem; border-radius:3px; width:320px; text-align:center; box-shadow:0 4px 15px rgba(0,0,0,0.2); border-top: 5px solid var(--primary);">
            <h3 style="margin-bottom:0.5rem; font-size:1.2rem; color:var(--text-main);" data-i18n="modal.unlockTitle">ロック解除</h3>
            <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1.5rem;" data-i18n="modal.unlockDesc">編集用のパスワードを入力してください</p>
            <input type="password" id="modalPwdInput" style="margin-bottom:1.5rem; text-align:center; font-size:1.2rem; letter-spacing:5px; padding: 0.8rem;" onkeypress="if(event.key==='Enter') submitPwdModal()">
            <div style="display:flex; justify-content:space-between; gap:1rem;">
                <button type="button" class="secondary-btn" style="flex:1;" onclick="closePwdModal()" data-i18n="button.cancel">キャンセル</button>
                <button type="button" class="primary-btn" style="flex:1;" onclick="submitPwdModal()" data-i18n="button.confirm">確認</button>
            </div>
        </div>
    </div>

    <!-- 弹窗提示 -->
    <div id="toast" data-i18n="toast.saved">保存成功。</div>

    <script>
        let currentData = [];
        let tagStore = {};
        let dbCatalog = { types: [] };
        let dbProbeTimers = {};
        let currentOrgPage = 1;
        const ORGS_PER_PAGE = 5;

        window.addEventListener('DOMContentLoaded', () => {
            const expiry = localStorage.getItem('authExpiry');
            if (expiry && new Date().getTime() < parseInt(expiry)) {
                document.getElementById('pwdModal').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'block';
                loadAdminData();
            } else {
                document.getElementById('modalPwdInput').focus();
            }
        });

        window.addEventListener('i18n:changed', () => {
            initFilter();
            renderEditor();
        });

        function loadAdminData() {
            const timestamp = new Date().getTime();
            const dataRequest = fetch('data.csv?t=' + timestamp, { cache: 'no-store' })
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.text();
                });
            const tagsRequest = fetch('tags.json?t=' + timestamp, { cache: 'no-store' })
                .then(response => response.ok ? response.json() : {})
                .catch(() => ({}));
            const dbCatalogRequest = fetch('db_versions.json?t=' + timestamp, { cache: 'no-store' })
                .then(response => response.ok ? response.json() : { types: [] })
                .catch(() => ({ types: [] }));

            Promise.all([dataRequest, tagsRequest, dbCatalogRequest])
                .then(([csvText, tagsJson, dbJson]) => {
                    tagStore = normalizeTagStore(tagsJson);
                    dbCatalog = normalizeDbCatalog(dbJson);
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            currentData = results.data.map(row => ({
                                ...row,
                                _tags: tagsForRow(row).join(', ')
                            }));
                            applyDetectedDbTypes();
                            initFilter();
                            renderEditor();
                        }
                    });
                })
                .catch(error => {
                    console.error('data.csv の読み込みに失敗しました:', error);
                    document.getElementById('editorArea').innerHTML = `<div style="text-align:center; color:red; padding: 2rem;">${t('select.loadFailed')}</div>`;
                });
        }

        function renderEditor() {
            const editorArea = document.getElementById('editorArea');
            editorArea.innerHTML = '';

            if(currentData.length === 0) {
                editorArea.innerHTML = `<div class="card" style="text-align:center; padding:4rem; color:var(--text-muted); font-weight: bold;">${t('state.noAdminData')}</div>`;
                renderAdminSummary(0, 0, 1, 1);
                return;
            }

            const orgMap = new Map();
            currentData.forEach((row, idx) => {
                const group = getOrgGroup(row);
                if (!orgMap.has(group.key)) orgMap.set(group.key, { ...group, rows: [] });
                orgMap.get(group.key).rows.push({ ...row, originalIndex: idx });
            });

            const sortedOrgs = Array.from(orgMap.values()).sort((a,b) => {
                if(a.isUnset) return -1;
                if(b.isUnset) return 1;
                return a.label.localeCompare(b.label);
            });

            const filterVal = document.getElementById('orgFilter').value;
            let filteredOrgs = sortedOrgs;

            if (filterVal !== '') {
                filteredOrgs = sortedOrgs.filter(org => org.key === filterVal || org.isUnset);
            }

            if (filteredOrgs.length === 0) {
                renderAdminSummary(0, currentData.length, 1, 1);
                editorArea.innerHTML = `<div class="card" style="text-align:center; padding:4rem; color:var(--text-muted); font-weight: 600;">${t('state.noMatchedOrg')}</div>`;
                return;
            }

            const totalPages = Math.ceil(filteredOrgs.length / ORGS_PER_PAGE);
            if (currentOrgPage > totalPages) currentOrgPage = Math.max(1, totalPages);
            if (currentOrgPage < 1) currentOrgPage = 1;
            renderAdminSummary(filteredOrgs.length, currentData.length, currentOrgPage, Math.max(1, totalPages));

            const startIndex = (currentOrgPage - 1) * ORGS_PER_PAGE;
            const endIndex = Math.min(startIndex + ORGS_PER_PAGE, filteredOrgs.length);
            const orgsToShow = filteredOrgs.slice(startIndex, endIndex);

            orgsToShow.forEach(org => {
                const orgBlock = document.createElement('div');
                orgBlock.className = 'card org-card';

                const headerWrap = document.createElement('div');
                headerWrap.className = 'org-block-header';

                const orgTitleEditor = document.createElement('div');
                orgTitleEditor.className = 'org-title-editor';
                orgTitleEditor.innerHTML = `
                    <div class="edit-field">
                        <label>${t('label.orgName')}</label>
                        <input type="text" value="${escapeHtml(org.isUnset ? '' : org.name)}" onchange="updateOrgGroup('${escapeJs(org.key)}', '組織名', this.value)">
                    </div>
                    <div class="edit-field">
                        <label>${t('label.orgCode')}</label>
                        <input class="org-code-input" type="text" value="${escapeHtml(org.code)}" onchange="updateOrgGroup('${escapeJs(org.key)}', '組織コード', this.value)">
                    </div>
                `;
                headerWrap.appendChild(orgTitleEditor);

                if (!org.isUnset) {
                    const addEnvBtn = document.createElement('button');
                    addEnvBtn.type = 'button';
                    addEnvBtn.className = 'secondary-btn';
                    addEnvBtn.textContent = t('button.addEnvToOrg');
                    addEnvBtn.onclick = () => addNewRow(org);
                    headerWrap.appendChild(addEnvBtn);
                }

                orgBlock.appendChild(headerWrap);

                const tableWrap = document.createElement('div');
                tableWrap.className = 'env-card-editor-list';

                const rows = org.rows;
                rows.forEach(item => {
                    const idx = item.originalIndex;
                    const dbParts = parseDbConnection(item['DB名']);
                    const dbAutoText = item['DBタイプ'] || item['DBバージョン']
                        ? `${escapeHtml(item['DBタイプ'] || t('unset.value'))}${item['DBバージョン'] ? ' ' + escapeHtml(item['DBバージョン']) : ''}`
                        : t('admin.dbManual');
                    const itemEditor = document.createElement('div');
                    itemEditor.className = 'env-editor-card';
                    itemEditor.innerHTML = `
                        <div class="env-editor-card-header">
                            <div class="edit-field env-editor-card-title">
                                <label>${t('label.envName')}</label>
                                <input type="text" value="${escapeHtml(item['構築環境名'])}" onchange="updateData(${idx}, '構築環境名', this.value)">
                                <div class="env-title-tags">
                                    <label>${t('label.tags')}</label>
                                    <input type="text" value="${escapeHtml(item['_tags'])}" placeholder="tag1, tag2" onchange="updateData(${idx}, '_tags', this.value)">
                                </div>
                            </div>
                        </div>
                        <div class="env-editor-body">
                            <div class="editor-section">
                                <div class="editor-section-head">
                                    <span class="editor-section-title">${iconPanel()}${t('admin.sectionAccess')}</span>
                                </div>
                                <div class="editor-section-grid">
                                    <div class="edit-field span-12">
                                        <label>${t('label.url')}</label>
                                        <input type="text" value="${escapeHtml(item['URL'])}" onchange="updateData(${idx}, 'URL', this.value)">
                                    </div>
                                    <div class="edit-field span-6">
                                        <label>${t('label.loginId')}</label>
                                        <input type="text" value="${escapeHtml(item['ログインID'])}" onchange="updateData(${idx}, 'ログインID', this.value)">
                                    </div>
                                    <div class="edit-field span-6">
                                        <label>${t('label.password')}</label>
                                        <input type="text" value="${escapeHtml(item['ログインパスワード'])}" onchange="updateData(${idx}, 'ログインパスワード', this.value)">
                                    </div>
                                </div>
                            </div>
                            <div class="editor-section">
                                <div class="editor-section-head">
                                    <span class="editor-section-title">${iconDatabase()}${t('admin.sectionDatabase')}</span>
                                    <div class="db-section-actions">
                                        <span class="db-detected-pill">${dbAutoText}</span>
                                        <button type="button" class="db-probe-btn" onclick="probeDatabase(${idx}, true)">${iconRefresh()}${t('button.probeDb')}</button>
                                    </div>
                                </div>
                                <div class="editor-section-grid">
                                    <div class="edit-field span-6">
                                        <label>${t('label.dbHost')}</label>
                                        <input type="text" value="${escapeHtml(dbParts.host)}" onchange="updateDbPart(${idx}, 'host', this.value)">
                                    </div>
                                    <div class="edit-field span-3">
                                        <label>${t('label.dbPort')}</label>
                                        <input type="text" value="${escapeHtml(dbParts.port)}" onchange="updateDbPart(${idx}, 'port', this.value)">
                                    </div>
                                    <div class="edit-field span-3">
                                        <label>${t('label.dbInstance')}</label>
                                        <input type="text" value="${escapeHtml(dbParts.database)}" onchange="updateDbPart(${idx}, 'database', this.value)">
                                    </div>
                                    <div class="edit-field span-6">
                                        <label>${t('label.dbUser')}</label>
                                        <input type="text" value="${escapeHtml(item['DBユーザー名'])}" onchange="updateData(${idx}, 'DBユーザー名', this.value); scheduleDbProbe(${idx})">
                                    </div>
                                    <div class="edit-field span-6">
                                        <label>${t('label.dbPwd')}</label>
                                        <input type="text" value="${escapeHtml(item['DBパスワード'])}" onchange="updateData(${idx}, 'DBパスワード', this.value); scheduleDbProbe(${idx})">
                                    </div>
                                    <div class="edit-field span-6">
                                        <label>${t('label.dbType')}</label>
                                        ${renderDbTypeSelect(idx, item['DBタイプ'])}
                                    </div>
                                    <div class="edit-field span-6">
                                        <label>${t('label.dbVersion')}</label>
                                        ${renderDbVersionSelect(idx, item['DBタイプ'], item['DBバージョン'])}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="env-editor-card-footer">
                            <button type="button" class="del-btn" onclick="deleteRow(${idx})" title="${t('button.deleteEnv')}">${t('button.deleteEnv')}</button>
                        </div>
                    `;
                    tableWrap.appendChild(itemEditor);
                });

                orgBlock.appendChild(tableWrap);
                editorArea.appendChild(orgBlock);
            });
        }

        function renderAdminSummary(orgCount, rowCount, page, totalPages) {
            const stat = document.getElementById('adminStat');
            stat.innerHTML = t('admin.stat', { org: orgCount, env: rowCount });

            const pager = document.getElementById('toolbarPagination');
            pager.innerHTML = '';

            const prevBtn = document.createElement('button');
            prevBtn.type = 'button';
            prevBtn.textContent = '‹';
            prevBtn.onclick = () => changePage(-1);
            prevBtn.disabled = page <= 1;

            const pageSpan = document.createElement('span');
            pageSpan.textContent = `${page} / ${totalPages}`;

            const nextBtn = document.createElement('button');
            nextBtn.type = 'button';
            nextBtn.textContent = '›';
            nextBtn.onclick = () => changePage(1);
            nextBtn.disabled = page >= totalPages;

            pager.appendChild(prevBtn);
            pager.appendChild(pageSpan);
            pager.appendChild(nextBtn);
        }

        function changePage(direction) {
            currentOrgPage += direction;
            renderEditor();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateData(index, field, value) {
            currentData[index][field] = value;
            if (field === 'DBタイプ') {
                const versions = getDbVersions(value);
                if (!versions.includes(currentData[index]['DBバージョン'])) {
                    currentData[index]['DBバージョン'] = '';
                }
                renderEditor();
            }
        }

        function parseDbConnection(dbName) {
            const text = (dbName || '').trim();
            const match = text.match(/^(.*?):(\d+)[/:](.+)$/);
            if (!match) {
                return { host: text, port: '', database: '' };
            }
            return { host: match[1], port: match[2], database: match[3] };
        }

        function buildDbConnection(parts) {
            const host = (parts.host || '').trim();
            const port = (parts.port || '').trim();
            const database = (parts.database || '').trim();
            if (!host && !port && !database) return '';
            if (host && port && database) return `${host}:${port}/${database}`;
            return [host, port, database].filter(Boolean).join(':');
        }

        function updateDbPart(index, part, value) {
            const row = currentData[index];
            if (!row) return;
            const parts = parseDbConnection(row['DB名']);
            parts[part] = value;
            row['DB名'] = buildDbConnection(parts);
            scheduleDbProbe(index);
        }

        function updateOrgGroup(groupKey, field, value) {
            currentData.forEach(row => {
                if (getOrgGroup(row).key === groupKey) {
                    row[field] = value;
                }
            });
            initFilter();
            renderEditor();
        }

        function deleteRow(index) {
            if(confirm(t('confirm.delete'))) {
                currentData.splice(index, 1);
                saveToServer();
            }
        }

        function addNewRow(org) {
            const selectedOrg = org || findOrgGroupByKey(document.getElementById('orgFilter').value);
            currentData.unshift({
                '組織コード': selectedOrg ? selectedOrg.code : '',
                '組織名': selectedOrg ? selectedOrg.name : '',
                '構築環境名': '',
                'URL': '',
                'ログインID': '',
                'ログインパスワード': '',
                'DBタイプ': '',
                'DBバージョン': '',
                'DB名': '',
                'DBユーザー名': '',
                'DBパスワード': '',
                '_tags': ''
            });
            
            // 新規追加時は確実に1ページ目に戻す
            currentOrgPage = 1;

            initFilter();
            renderEditor();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initFilter() {
            const orgSelect = document.getElementById('orgFilter');
            const currentSelected = orgSelect.value;
            
            const orgMap = new Map();
            currentData.forEach(item => {
                const group = getOrgGroup(item);
                if (!group.isUnset && !orgMap.has(group.key)) orgMap.set(group.key, group);
            });
            
            orgSelect.innerHTML = `<option value="">${t('select.allOrgs')}</option>`;
            Array.from(orgMap.values()).sort((a, b) => a.label.localeCompare(b.label)).forEach(org => {
                const opt = document.createElement('option');
                opt.value = org.key;
                opt.textContent = org.label;
                orgSelect.appendChild(opt);
            });
            
            if(Array.from(orgSelect.options).some(o => o.value === currentSelected)) {
                orgSelect.value = currentSelected;
            }
        }

        function saveToServer() {
            const filteredData = currentData.filter(row => {
                return (row['組織名'] || '').trim() !== '' || (row['構築環境名'] || '').trim() !== '' || (row['URL'] || '').trim() !== '';
            });
            
            const fields = ["組織コード", "組織名", "構築環境名", "URL", "ログインID", "ログインパスワード", "DBタイプ", "DBバージョン", "DB名", "DBユーザー名", "DBパスワード"];
            const csv = Papa.unparse({
                fields: fields,
                data: filteredData.map(row => {
                    const cleanRow = {};
                    fields.forEach(field => cleanRow[field] = row[field] || '');
                    return cleanRow;
                })
            }, { quotes: true });

            const tagsJson = JSON.stringify(buildTagStore(filteredData), null, 2);
            
            fetch('update_csv.jsp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain; charset=UTF-8'
                },
                body: csv
            })
            .then(res => {
                if (!res.ok) return res.text().then(text => { throw new Error(text); });
                return fetch('update_tags.jsp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=UTF-8'
                    },
                    body: tagsJson
                });
            })
            .then(res => {
                if (!res.ok) return res.text().then(text => { throw new Error(text); });
                currentData = filteredData;
                tagStore = buildTagStore(filteredData);
                initFilter();
                renderEditor();
                showToast(t('toast.savedDetail'));
            })
            .catch(err => {
                console.error(err);
                alert(t('error.save') + err.message);
            });
        }

        function normalizeTagStore(tagsJson) {
            if (!tagsJson || typeof tagsJson !== 'object') return {};
            if (tagsJson.records && typeof tagsJson.records === 'object') return tagsJson.records;
            return tagsJson;
        }

        function normalizeDbCatalog(dbJson) {
            if (!dbJson || !Array.isArray(dbJson.types)) return { types: [] };
            return {
                types: dbJson.types
                    .filter(item => item && item.label && Array.isArray(item.versions))
                    .map(item => ({
                        id: item.id || item.label,
                        label: item.label,
                        versions: item.versions.map(String)
                    }))
            };
        }

        function renderDbTypeSelect(index, selectedType) {
            const options = ['<option value=""></option>'].concat(dbCatalog.types.map(type => {
                const selected = type.label === selectedType ? ' selected' : '';
                return `<option value="${escapeHtml(type.label)}"${selected}>${escapeHtml(type.label)}</option>`;
            })).join('');
            return `<select onchange="updateData(${index}, 'DBタイプ', this.value)">${options}</select>`;
        }

        function iconPanel() {
            return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18"/></svg>';
        }

        function iconDatabase() {
            return '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/></svg>';
        }

        function iconRefresh() {
            return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12A9 9 0 0 1 18.5 5.8"/><path d="M18 2v4h4"/><path d="M6 22v-4H2"/></svg>';
        }

        function renderDbVersionSelect(index, selectedType, selectedVersion) {
            const versions = getDbVersions(selectedType);
            const disabled = versions.length === 0 ? ' disabled' : '';
            const options = ['<option value=""></option>'].concat(versions.map(version => {
                const selected = version === selectedVersion ? ' selected' : '';
                return `<option value="${escapeHtml(version)}"${selected}>${escapeHtml(version)}</option>`;
            })).join('');
            return `<select${disabled} onchange="updateData(${index}, 'DBバージョン', this.value)">${options}</select>`;
        }

        function getDbVersions(typeLabel) {
            const found = dbCatalog.types.find(type => type.label === typeLabel);
            return found ? found.versions : [];
        }

        function normalizeDbVersion(typeLabel, versionText, messageText = '') {
            const versions = getDbVersions(typeLabel);
            if (versions.length === 0) return '';
            const source = `${versionText || ''} ${messageText || ''}`;
            if (versions.includes(String(versionText || '').trim())) return String(versionText).trim();
            const tokens = source.match(/\d+/g) || [];
            for (const token of tokens) {
                if (versions.includes(token)) return token;
                const major = token.slice(0, 2);
                if (versions.includes(major)) return major;
            }
            return '';
        }

        function scheduleDbProbe(index) {
            if (dbProbeTimers[index]) clearTimeout(dbProbeTimers[index]);
            dbProbeTimers[index] = setTimeout(() => probeDatabase(index), 800);
        }

        function detectDbTypeFromName(dbName) {
            const text = (dbName || '').trim();
            const match = text.match(/^[^:\/\s]+:(\d+)[/:].+$/);
            if (!match) return '';
            const port = Number(match[1]);
            if (port === 1521) return 'Oracle';
            if (port === 5432) return 'PostgreSQL';
            return '';
        }

        function applyDetectedDbType(row) {
            const detectedType = detectDbTypeFromName(row['DB名']);
            if (!detectedType) return false;
            if (row['DBタイプ'] === detectedType) return false;
            row['DBタイプ'] = detectedType;
            if (!getDbVersions(detectedType).includes(row['DBバージョン'])) {
                row['DBバージョン'] = '';
            }
            return true;
        }

        function applyDetectedDbTypes() {
            currentData.forEach(row => applyDetectedDbType(row));
        }

        function probeDatabase(index, manual = false) {
            const row = currentData[index];
            if (!row) return;
            const dbName = (row['DB名'] || '').trim();
            const dbUser = (row['DBユーザー名'] || '').trim();
            const dbPwd = (row['DBパスワード'] || '').trim();
            if (!dbName) return;

            const shouldRender = applyDetectedDbType(row);
            if (!dbUser || !dbPwd) {
                if (shouldRender) renderEditor();
                if (manual) showToast(t('toast.dbProbeNeedCredential'));
                return;
            }

            fetch('db_probe.jsp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: [
                    'dbName=' + encodeURIComponent(dbName),
                    'dbUser=' + encodeURIComponent(dbUser),
                    'dbPwd=' + encodeURIComponent(dbPwd)
                ].join('&')
            })
            .then(res => res.json())
            .then(result => {
                if (!result) return;
                if (result.type) {
                    currentData[index]['DBタイプ'] = result.type;
                    if (!getDbVersions(result.type).includes(currentData[index]['DBバージョン'])) {
                        currentData[index]['DBバージョン'] = '';
                    }
                }
                const normalizedVersion = normalizeDbVersion(
                    currentData[index]['DBタイプ'],
                    result.version,
                    result.message
                );
                if (normalizedVersion) currentData[index]['DBバージョン'] = normalizedVersion;
                renderEditor();
                if (manual) {
                    showToast(normalizedVersion
                        ? t('toast.dbProbeOk')
                        : t('toast.dbProbeVersionFailed', { reason: shortenMessage(result.message || '') }));
                }
            })
            .catch(err => {
                if (shouldRender) renderEditor();
                if (manual) showToast(t('toast.dbProbeVersionFailed', { reason: shortenMessage(err.message || '') }));
                console.warn('DB probe failed:', err);
            });
        }

        function shortenMessage(message) {
            const text = String(message || '').replace(/\s+/g, ' ').trim();
            return text.length > 90 ? text.slice(0, 90) + '...' : (text || t('error.network'));
        }

        async function probeAllDatabases() {
            const rows = currentData
                .map((row, index) => ({ row, index }))
                .filter(item => (item.row['DB名'] || '').trim());
            for (const item of rows) {
                await probeDatabaseAsync(item.index);
            }
            renderEditor();
            showToast(t('toast.dbProbeAllDone'));
        }

        async function probeDatabaseAsync(index) {
            const row = currentData[index];
            if (!row) return;
            const dbName = (row['DB名'] || '').trim();
            const dbUser = (row['DBユーザー名'] || '').trim();
            const dbPwd = (row['DBパスワード'] || '').trim();
            if (!dbName) return;
            applyDetectedDbType(row);
            if (!dbUser || !dbPwd) return;
            try {
                const res = await fetch('db_probe.jsp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: [
                        'dbName=' + encodeURIComponent(dbName),
                        'dbUser=' + encodeURIComponent(dbUser),
                        'dbPwd=' + encodeURIComponent(dbPwd)
                    ].join('&')
                });
                const result = await res.json();
                if (result && result.type) {
                    row['DBタイプ'] = result.type;
                    if (!getDbVersions(result.type).includes(row['DBバージョン'])) {
                        row['DBバージョン'] = '';
                    }
                }
                const normalizedVersion = normalizeDbVersion(row['DBタイプ'], result && result.version, result && result.message);
                if (normalizedVersion) row['DBバージョン'] = normalizedVersion;
            } catch (err) {
                console.warn('DB probe failed:', err);
            }
        }

        function getRowKey(row) {
            return [
                row['組織コード'] || '',
                row['組織名'] || '',
                row['構築環境名'] || '',
                row['URL'] || '',
                row['ログインID'] || ''
            ].map(value => String(value).trim()).join('||');
        }

        function parseTags(value) {
            return String(value || '')
                .split(/[,\n、，]/)
                .map(tag => tag.trim())
                .filter((tag, index, arr) => tag !== '' && arr.indexOf(tag) === index);
        }

        function tagsForRow(row) {
            const record = tagStore[getRowKey(row)] || tagStore[getLegacyRowKey(row)];
            if (Array.isArray(record)) return record;
            if (record && Array.isArray(record.tags)) return record.tags;
            return [];
        }

        function buildTagStore(rows) {
            const records = {};
            rows.forEach(row => {
                const key = getRowKey(row);
                const tags = parseTags(row._tags);
                if (key !== '||||||||' && tags.length > 0) {
                    records[key] = tags;
                }
            });
            return records;
        }

        function getLegacyRowKey(row) {
            return [
                row['組織名'] || '',
                row['構築環境名'] || '',
                row['URL'] || '',
                row['ログインID'] || ''
            ].map(value => String(value).trim()).join('||');
        }

        function getOrgGroup(row) {
            const code = (row['組織コード'] || '').trim();
            const name = (row['組織名'] || '').trim();
            const isUnset = code === '' && name === '';
            const displayName = name || t('unset.name');
            return {
                key: isUnset ? '__unset__' : (code || `name:${name}`),
                code,
                name: isUnset ? t('unset.org') : displayName,
                label: isUnset ? t('unset.org') : (code ? `${code} - ${displayName}` : displayName),
                isUnset
            };
        }

        function findOrgGroupByKey(key) {
            if (!key) return null;
            for (const row of currentData) {
                const group = getOrgGroup(row);
                if (group.key === key) return group;
            }
            return null;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function escapeJs(str) {
            return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        function closePwdModal() {
            window.location.href = 'index.html';
        }

        function submitPwdModal() {
            const pwd = document.getElementById('modalPwdInput').value;
            if (!pwd) return;

            fetch('auth.jsp', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: 'pwd=' + encodeURIComponent(pwd)
            })
            .then(res => res.text())
            .then(txt => {
                if (txt.trim() === "OK") {
                    localStorage.setItem('authExpiry', new Date().getTime() + 15 * 60 * 1000);
                    document.getElementById('pwdModal').style.display = 'none';
                    document.getElementById('adminContainer').style.display = 'block';
                    loadAdminData();
                    showToast(t('toast.authOk'));
                } else {
                    alert(t('error.authWrong'));
                    document.getElementById('modalPwdInput').value = '';
                    document.getElementById('modalPwdInput').focus();
                }
            })
            .catch(err => {
                console.error(err);
                alert(t('error.auth'));
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
